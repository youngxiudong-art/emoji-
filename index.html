<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界读书日：看Emoji猜书名</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .game-container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
        .top-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; font-size: 16px; }
        .progress { color: #3498db; }
        .timer { color: #e74c3c; background: #fadbd8; padding: 5px 10px; border-radius: 6px; }
        .emoji-display { font-size: 48px; margin: 20px 0; letter-spacing: 5px; }
        .keywords { font-size: 18px; color: #e67e22; margin-bottom: 20px; font-weight: bold; display: none; min-height: 24px; }
        input[type="text"] { width: 80%; padding: 10px; font-size: 16px; border: 2px solid #bdc3c7; border-radius: 6px; margin-bottom: 20px; outline: none; text-align: center; }
        input[type="text"]:focus { border-color: #3498db; }
        .btn-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        button { color: white; border: none; padding: 10px 15px; font-size: 15px; border-radius: 6px; cursor: pointer; transition: opacity 0.3s; }
        button:hover { opacity: 0.8; }
        .btn-start { background-color: #3498db; width: 100%; font-size: 18px; padding: 15px; margin-top: 20px; border-radius: 8px;}
        .btn-submit { background-color: #2ecc71; width: 100%; font-size: 16px; padding: 12px; margin-bottom: 10px; }
        .btn-hint { background-color: #f39c12; }
        .btn-skip { background-color: #3498db; }
        .btn-end { background-color: #e74c3c; }
        .feedback { margin-top: 10px; font-weight: bold; min-height: 24px; }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; }
        #game-screen, #result-screen { display: none; }
        .final-score { font-size: 32px; color: #e74c3c; margin: 20px 0; }
        .start-icon { font-size: 60px; margin: 20px 0; }
    </style>
</head>
<body>

<div class="game-container" id="start-screen">
    <h1>📚 世界读书日挑战</h1>
    <div class="subtitle">看Emoji猜书名</div>
    <div class="start-icon">🤔📖</div>
    <p style="color: #555; font-size: 15px; line-height: 1.6;">
        规则说明：<br>
        1. 直接答对得 <strong>2</strong> 分。<br>
        2. 点击提示后答对得 <strong>1</strong> 分。<br>
        3. 答错、跳过不扣分，限时 <strong>15</strong> 分钟。
    </p>
    
    <input type="text" id="team-name" placeholder="请输入小组名称 (必填)" autocomplete="off">
    <button class="btn-start" onclick="startGame()">▶️ 开始游戏</button>
</div>

<div class="game-container" id="game-screen">
    <h1>📚 看Emoji猜书名</h1>
    <div class="subtitle">直接答对+2分，使用提示+1分</div>
    <div class="top-info">
        <div class="progress">题目: <span id="current-q">1</span> / 18</div>
        <div class="timer" id="timer-display">15:00</div>
    </div>
    <div class="emoji-display" id="emoji"></div>
    <div class="keywords" id="keywords"></div>
    <input type="text" id="answer-input" placeholder="请输入书名 (无需书名号)" autocomplete="off">
    <button class="btn-submit" onclick="checkAnswer()">提交答案</button>
    <div class="btn-group">
        <button class="btn-hint" id="hint-btn" onclick="showHint()">💡 提示</button>
        <button class="btn-skip" onclick="skipQuestion()">⏭️ 跳过</button>
        <button class="btn-end" onclick="endGame()">🛑 结束游戏</button>
    </div>
    <div class="feedback" id="feedback"></div>
</div>

<div class="game-container" id="result-screen">
    <h1>🎉 游戏结束！</h1>
    <div class="final-score">本轮得分: <span id="score">0</span> / 36</div>
    <p id="evaluation"></p>
    <button class="btn-submit" onclick="location.reload()">再玩一次</button>
</div>

<script>
    // ⚠️ 注意：这里必须替换为你最终部署的后端服务器地址！
    const SERVER_URL = "http://8.138.215.100:3000";; 

    let questions = [
        { emoji: "💧🐅🧱", keywords: "好汉", answer: "水浒传" },
        { emoji: "☂️🪜", keywords: "脱水", answer: "三体" },
        { emoji: "🧨🍊", keywords: "渡船", answer: "边城" },
        { emoji: "🍎🍚🌍", keywords: "苦难", answer: "平凡的世界" },
        { emoji: "🧃📓🛞", keywords: "剩余价值", answer: "资本论" },
        { emoji: "🌲🍯🍄☠️", keywords: "羊皮卷", answer: "百年孤独" },
        { emoji: "🥣🌰1️⃣5️⃣🍯", keywords: "历史", answer: "万历十五年" },
        { emoji: "❄️🍊🐔", keywords: "这是最好的时代", answer: "双城记" },
        { emoji: "🐘🤮🇨🇳", keywords: "差序格局", answer: "乡土中国" },
        { emoji: "⌚️✂️🪨", keywords: "奇点", answer: "时间简史" },
        { emoji: "🔴🐟⬛", keywords: "于连", answer: "红与黑" },
        { emoji: "🍎🪓🛞", keywords: "看不见的手", answer: "国富论" },
        { emoji: "🗣️", keywords: "救救孩子", answer: "呐喊" },
        { emoji: "🍐🐘🍲", keywords: "哲学", answer: "理想国" },
        { emoji: "🦏👊🌺", keywords: "唵", answer: "悉达多" },
        { emoji: "😢🌧️", keywords: "繁漪", answer: "雷雨" },
        { emoji: "🥤📦🐔", keywords: "红娘", answer: "西厢记" },
        { emoji: "🍳😍", keywords: "桑菲尔德", answer: "简爱" }
    ];

    let currentIndex = 0, score = 0, timerId, timeLeft = 15 * 60, hintUsed = false; 
    let teamName = "";

    const emojiEl = document.getElementById('emoji');
    const keywordsEl = document.getElementById('keywords');
    const currentQEl = document.getElementById('current-q');
    const inputEl = document.getElementById('answer-input');
    const feedbackEl = document.getElementById('feedback');
    const hintBtn = document.getElementById('hint-btn');
    const timerDisplay = document.getElementById('timer-display');

    function startGame() {
        teamName = document.getElementById('team-name').value.trim();
        if(!teamName) {
            alert("请先输入小组名称！");
            return;
        }
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        shuffleQuestions();
        startTimer();
        loadQuestion();
    }

    function shuffleQuestions() {
        for (let i = questions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [questions[i], questions[j]] = [questions[j], questions[i]];
        }
    }

    function startTimer() {
        timerId = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            let s = (timeLeft % 60).toString().padStart(2, '0');
            timerDisplay.innerText = m + ":" + s;
            if (timeLeft <= 0) { clearInterval(timerId); endGame(); }
        }, 1000);
    }

    function loadQuestion() {
        if (currentIndex < questions.length) {
            emojiEl.innerText = questions[currentIndex].emoji;
            keywordsEl.innerText = questions[currentIndex].keywords;
            keywordsEl.style.display = 'none';
            hintBtn.style.display = 'inline-block';
            currentQEl.innerText = currentIndex + 1;
            inputEl.value = '';
            feedbackEl.innerText = '';
            hintUsed = false; 
            inputEl.focus();
        } else {
            endGame();
        }
    }

    function showHint() {
        keywordsEl.style.display = 'block';
        hintBtn.style.display = 'none';
        hintUsed = true; 
        inputEl.focus();
    }

    function skipQuestion() { currentIndex++; loadQuestion(); }

    function checkAnswer() {
        const userAnswer = inputEl.value.replace(/《|》|\s/g, '').toLowerCase();
        const correctAnswer = questions[currentIndex].answer.replace(/《|》|\s|·/g, '').toLowerCase();
        if (userAnswer === '') return;

        if (userAnswer === correctAnswer || (correctAnswer.includes(userAnswer) && userAnswer.length >= 2)) {
            let pointsAwarded = hintUsed ? 1 : 2; 
            score += pointsAwarded;
            feedbackEl.innerText = "✅ 回答正确！(+" + pointsAwarded + "分)";
            feedbackEl.className = "feedback correct";
        } else {
            feedbackEl.innerText = "❌ 正确答案是：《" + questions[currentIndex].answer + "》";
            feedbackEl.className = "feedback wrong";
        }
        currentIndex++;
        setTimeout(() => { loadQuestion(); }, 1500);
    }

    function endGame() {
        clearInterval(timerId);
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score').innerText = score;
        
        let evalText = "";
        if(score >= 30) evalText = "🏆 真正的阅读大师！";
        else if(score >= 18) evalText = "🌟 知识储备很棒！";
        else evalText = "📚 还需要多读书哦！";
        document.getElementById('evaluation').innerText = evalText;

        // 向服务器上传成绩
        fetch(SERVER_URL + '/api/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ team: teamName, score: score })
        }).then(() => console.log("上传成功")).catch(err => console.log("上传失败"));
    }

    inputEl.addEventListener("keypress", function(event) {
        if (event.key === "Enter") { event.preventDefault(); checkAnswer(); }
    });
</script>
</body>
</html>
